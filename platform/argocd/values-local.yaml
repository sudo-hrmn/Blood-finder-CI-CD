dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  replicas: 0

controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 192Mi
  readinessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 2
  livenessProbe:
    initialDelaySeconds: 20
    timeoutSeconds: 2

server:
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 192Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 96Mi
